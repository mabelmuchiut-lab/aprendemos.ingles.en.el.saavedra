<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Familia Simpson - Profe Belén</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-indigo-600 text-white shadow-md px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-2">
        <h1 class="text-xl font-bold tracking-wide text-center sm:text-left">CLASES DE INGLÉS CON LA PROFE BELÉN</h1>
    </nav>

    <main class="max-w-4xl mx-auto my-8 px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Menú Lateral -->
        <aside class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
            <h3 class="font-bold text-lg mb-4 text-gray-700 border-b pb-2 border-gray-100">Alumnos de 4to. Año A y B</h3>
            <div class="space-y-3">
                <a href="index.html" class="w-full text-left p-3 bg-gray-100 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 rounded-xl font-medium transition text-center md:text-left block border border-transparent">
                    🚀 1. ¡Arrancamos con todo!
                </a>
                <a href="simpsons.html" class="w-full text-left p-3 bg-amber-500 text-white rounded-xl font-medium transition text-center md:text-left block shadow-sm">
                    📝 2. Vemos los integrantes de la family en Ingles!!
                </a>
                <a href="profesiones.html" class="w-full text-left p-3 bg-gray-100 text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 rounded-xl font-medium transition text-center md:text-left block border border-transparent">
                    💼 3. Las Profesiones en Ingles
                </a>
            </div>
        </aside>

        <!-- Contenido -->
        <section class="md:col-span-2">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <span class="text-xs font-bold uppercase tracking-wider text-amber-500">Vocabulary Game 🍩</span>
                <h2 class="text-2xl font-bold mt-1 mb-2 text-gray-900">The Simpsons Family Tree</h2>
                <p class="text-sm text-gray-600 mb-6">Mira el árbol genealógico y haz clic en los personajes:</p>
                
                <div class="mb-6 flex justify-center bg-gray-100 p-2 rounded-xl border border-gray-200">
                    <img src="simpsons.jpg" alt="The Simpsons Family Tree" class="max-w-full h-auto rounded-lg shadow-sm">
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-6">
                    <button onclick="mostrarFamiliar('Homer', 'Father / Dad', 'Homer is Bart\'s father.')" class="p-2.5 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded-xl font-bold text-center text-sm cursor-pointer">👨‍🦲 Homer</button>
                    <button onclick="mostrarFamiliar('Marge', 'Mother / Mom', 'Marge is Lisa\'s mother.')" class="p-2.5 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded-xl font-bold text-center text-sm cursor-pointer">👩‍🦱 Marge</button>
                    <button onclick="mostrarFamiliar('Bart', 'Brother', 'Bart is Maggie\'s brother.')" class="p-2.5 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded-xl font-bold text-center text-sm cursor-pointer">👦 Bart</button>
                    <button onclick="mostrarFamiliar('Lisa', 'Sister', 'Lisa is Bart\'s sister.')" class="p-2.5 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded-xl font-bold text-center text-sm cursor-pointer">👧 Lisa</button>
                    <button onclick="mostrarFamiliar('Maggie', 'Sister', 'Maggie is the youngest sister.')" class="p-2.5 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded-xl font-bold text-center text-sm cursor-pointer">👶 Maggie</button>
                </div>

                <div id="simpsons-card" class="hidden p-5 bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-amber-400 rounded-2xl text-center">
                    <h4 id="simp-nombre" class="text-lg font-black text-amber-600 uppercase"></h4>
                    <div id="simp-ingles" class="text-3xl font-extrabold text-indigo-700 my-2"></div>
                    <p id="simp-ejemplo" class="text-gray-700 font-medium bg-indigo-50 p-3 rounded-xl border border-indigo-100 text-sm"></p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function mostrarFamiliar(nombre, parentescoIngles, ejemplo) {
            document.getElementById('simp-nombre').innerText = nombre;
            document.getElementById('simp-ingles').innerText = parentescoIngles;
            document.getElementById('simp-ejemplo').innerText = `💡 ${ejemplo}`;
            document.getElementById('simpsons-card').classList.remove('hidden');
        }
    </script>
</body>
</html>
